<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoneyMate — Your friendly money companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["'Plus Jakarta Sans'", "system-ui", "sans-serif"] },
          colors: {
            cream: "#F5EFE0",
            creamdeep: "#EBE2CE",
            ink: "#2D2420",
            inkmute: "#6B5E54",
            peach:  { 100: "#FFE8D4", 200: "#FFD2AF", 300: "#FFBC89" },
            pyellow:{ 100: "#FFF2C2", 200: "#FFE89A", 300: "#FFDA6A" },
            pmint:  { 100: "#D6EFDE", 200: "#B8E6C6", 300: "#92D9A8" },
            pblue:  { 100: "#DCEAF7", 200: "#BFD9F2", 300: "#96C2E6" },
            ppink:  { 100: "#FFDBE7", 200: "#FFCCDB", 300: "#FFA7BF" },
            plilac: { 100: "#E8DBF7", 200: "#DCCBF2", 300: "#C1A8E8" },
            pgreen: { 100: "#DDF0E0", 200: "#C8E8CE", 300: "#9DD4AB" },
            ptan:   { 100: "#F3E4CD", 200: "#E8D1A8", 300: "#D9B378" },
            prose:  { 100: "#FBD5DD", 200: "#F4B5C3", 300: "#E68FA4" },
            psky:   { 100: "#D1E9F5", 200: "#B0D6EA", 300: "#82BBDA" },
            pcoral: { 100: "#FFE0CC", 200: "#FFC19A", 300: "#FFA064" },
          },
          boxShadow: {
            soft: "0 10px 30px -8px rgba(45,36,32,0.10), 0 3px 10px -4px rgba(45,36,32,0.04)",
            pop:  "0 20px 48px -14px rgba(45,36,32,0.18), 0 8px 18px -8px rgba(45,36,32,0.06)",
            inset: "inset 0 1px 0 rgba(255,255,255,0.6)"
          },
          borderRadius: { "4xl": "2rem", "5xl": "2.5rem" }
        }
      }
    };
  </script>
  <style>
    html, body { background: #F5EFE0; color: #2D2420; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    *:focus { outline: none; }
    input::placeholder, textarea::placeholder { color: #8a7f77; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .thin-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .thin-scroll::-webkit-scrollbar-thumb { background: rgba(45,36,32,0.22); border-radius: 999px; }
    .thin-scroll::-webkit-scrollbar-track { background: transparent; }
    .blob-1 { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
    .blob-2 { border-radius: 40% 60% 30% 70% / 60% 40% 70% 50%; }
    .blob-3 { border-radius: 70% 30% 50% 50% / 40% 70% 30% 60%; }
    @keyframes dotb { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }
    .dot { display: inline-block; width: 6px; height: 6px; margin: 0 2px; border-radius: 999px; background: #6B5E54; animation: dotb 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "framer-motion": "https://esm.sh/framer-motion@11.11.17?external=react,react-dom"
    }
  }
  </script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useMemo, useRef, useEffect } from "react";
    import { createRoot } from "react-dom/client";
    import { motion, AnimatePresence, useSpring, LayoutGroup } from "framer-motion";

    // ——————————————————————————————————————————————————————————————
    //  Helpers
    // ——————————————————————————————————————————————————————————————
    const num = (v) => { const n = parseFloat(v); return Number.isFinite(n) ? n : 0; };
    const fmt = (n, decimals = 0) =>
      Number(n).toLocaleString("en-IN", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      });

    function usePersistedState(key, defaultValue) {
      const [value, setValue] = useState(() => {
        try {
          const raw = window.localStorage.getItem(key);
          if (raw !== null) return JSON.parse(raw);
        } catch (e) {}
        return defaultValue;
      });
      const [savedAt, setSavedAt] = useState(null);
      useEffect(() => {
        try { window.localStorage.setItem(key, JSON.stringify(value)); setSavedAt(Date.now()); } catch (e) {}
      }, [key, value]);
      return [value, setValue, savedAt];
    }

    async function snapshotNode(node) {
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      return window.html2canvas(node, {
        backgroundColor: "#F5EFE0",
        scale: Math.min(2, window.devicePixelRatio || 1.5),
        useCORS: true,
        logging: false,
        ignoreElements: (el) => el.dataset && el.dataset.exportIgnore === "true",
      });
    }
    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    async function exportAs(kind) {
      const node = document.querySelector("[data-export-root]");
      if (!node || !window.html2canvas) return;
      const stamp = new Date().toISOString().slice(0, 10);
      const canvas = await snapshotNode(node);
      if (kind === "png") {
        canvas.toBlob((blob) => blob && downloadBlob(blob, `moneymate-${stamp}.png`));
        return;
      }
      if (kind === "pdf" && window.jspdf) {
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL("image/png");
        const pageW = 595.28;
        const imgH = (canvas.height * pageW) / canvas.width;
        const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: [pageW, Math.max(imgH, 842)] });
        pdf.addImage(imgData, "PNG", 0, 0, pageW, imgH);
        pdf.save(`moneymate-${stamp}.pdf`);
      }
    }

    // ——————————————————————————————————————————————————————————————
    //  Primitives
    // ——————————————————————————————————————————————————————————————
    function AnimatedNumber({ value, prefix = "", decimals = 0, className = "" }) {
      const spring = useSpring(value, { stiffness: 70, damping: 20, mass: 0.8 });
      const [display, setDisplay] = useState(value);
      useEffect(() => { spring.set(value); }, [value, spring]);
      useEffect(() => spring.on("change", (v) => setDisplay(v)), [spring]);
      return <span className={className}>{prefix}{fmt(display, decimals)}</span>;
    }

    function MoneyInput({ value, onChange, placeholder = "0", size = "md", prefix = "₹" }) {
      const sizeCls = size === "xl" ? "text-4xl sm:text-5xl font-extrabold"
        : size === "lg" ? "text-2xl font-bold"
        : "text-xl font-semibold";
      return (
        <div className="flex items-baseline gap-1.5">
          <span className={`${sizeCls} text-ink/60`}>{prefix}</span>
          <input type="number" inputMode="decimal" value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            className={`${sizeCls} bg-transparent w-full min-w-0 placeholder:text-ink/25 focus:placeholder:text-ink/15 transition-colors`} />
        </div>
      );
    }

    function SectionHeader({ title, hint, emoji }) {
      return (
        <motion.div initial={{ opacity: 0, x: -8 }} animate={{ opacity: 1, x: 0 }}
          transition={{ duration: 0.4 }}
          className="flex items-baseline gap-3 mb-4 px-1">
          <h2 className="text-lg font-bold flex items-center gap-2">
            {emoji && <span>{emoji}</span>} {title}
          </h2>
          {hint && <span className="text-xs text-inkmute">{hint}</span>}
        </motion.div>
      );
    }

    function TypingDots() {
      return <div className="flex items-center gap-0.5"><span className="dot" /><span className="dot" /><span className="dot" /></div>;
    }

    // ——————————————————————————————————————————————————————————————
    //  Header, saved indicator, export menu
    // ——————————————————————————————————————————————————————————————
    function SavedIndicator({ savedAt }) {
      const [pulse, setPulse] = useState(false);
      useEffect(() => {
        if (!savedAt) return;
        setPulse(true);
        const t = setTimeout(() => setPulse(false), 900);
        return () => clearTimeout(t);
      }, [savedAt]);
      return (
        <div data-export-ignore="true" className="flex items-center gap-1.5 text-[11px] font-semibold text-ink/70 bg-white/60 backdrop-blur rounded-full px-3 py-1.5 shadow-soft">
          <motion.span
            animate={{ scale: pulse ? [1, 1.4, 1] : 1, backgroundColor: pulse ? "#92D9A8" : "#9DD4AB" }}
            transition={{ duration: 0.6 }}
            className="w-2 h-2 rounded-full bg-pgreen-300 inline-block" />
          Saved locally
        </div>
      );
    }

    function ExportMenu() {
      const [open, setOpen] = useState(false);
      const [busy, setBusy] = useState(null);
      const ref = useRef(null);
      useEffect(() => {
        function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
        document.addEventListener("mousedown", onDoc);
        return () => document.removeEventListener("mousedown", onDoc);
      }, []);
      async function handle(kind) {
        setOpen(false); setBusy(kind);
        try { await exportAs(kind); } catch (e) { console.error(e); alert("Couldn't export. See console."); }
        setBusy(null);
      }
      return (
        <div className="relative" ref={ref} data-export-ignore="true">
          <motion.button whileHover={{ scale: 1.04 }} whileTap={{ scale: 0.96 }}
            onClick={() => setOpen(o => !o)} disabled={!!busy}
            className="text-[11px] font-semibold text-ink/80 bg-white/70 hover:bg-white backdrop-blur rounded-full px-3 py-1.5 shadow-soft flex items-center gap-1.5 disabled:opacity-60">
            {busy ? <>⏳ Saving…</> : <>⬇ Save</>}
          </motion.button>
          <AnimatePresence>
            {open && (
              <motion.div initial={{ opacity: 0, y: -6, scale: 0.96 }} animate={{ opacity: 1, y: 0, scale: 1 }}
                exit={{ opacity: 0, y: -6, scale: 0.96 }} transition={{ duration: 0.18 }}
                className="absolute right-0 mt-2 w-44 bg-white rounded-2xl shadow-pop p-1 z-50">
                <button onClick={() => handle("png")}
                  className="w-full text-left text-sm px-3 py-2 rounded-xl hover:bg-cream font-medium flex items-center gap-2 transition">
                  🖼️ Save as PNG
                </button>
                <button onClick={() => handle("pdf")}
                  className="w-full text-left text-sm px-3 py-2 rounded-xl hover:bg-cream font-medium flex items-center gap-2 transition">
                  📄 Save as PDF
                </button>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }

    function Header({ savedAt, onReset }) {
      const today = new Date().toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
      return (
        <motion.header initial={{ opacity: 0, y: -12 }} animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.5, ease: [0.2, 0.8, 0.2, 1] }}
          className="flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <motion.div whileHover={{ rotate: [0, -8, 8, -4, 0], scale: 1.05 }} transition={{ duration: 0.6 }}
              className="w-12 h-12 rounded-2xl bg-gradient-to-br from-peach-200 to-ppink-200 grid place-items-center shadow-soft">
              <span className="text-2xl">💰</span>
            </motion.div>
            <div>
              <h1 className="text-xl sm:text-2xl font-extrabold tracking-tight">MoneyMate</h1>
              <p className="text-[11px] sm:text-xs text-inkmute -mt-0.5">Your friendly money companion</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <SavedIndicator savedAt={savedAt} />
            <div className="hidden md:flex items-center gap-2 text-sm text-inkmute bg-white/50 backdrop-blur rounded-full px-4 py-1.5 shadow-soft">
              <span>🗓️</span><span className="font-medium">{today}</span>
            </div>
            <ExportMenu />
            <motion.button data-export-ignore="true" whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }}
              onClick={onReset} title="Clear saved data from this browser"
              className="text-[11px] font-semibold text-ink/70 hover:text-red-600 bg-white/60 hover:bg-ppink-100 backdrop-blur rounded-full px-3 py-1.5 shadow-soft transition-colors">
              ↺ Reset
            </motion.button>
          </div>
        </motion.header>
      );
    }

    // ——————————————————————————————————————————————————————————————
    //  Income Card — main salary
    // ——————————————————————————————————————————————————————————————
    function IncomeCard({ income, setIncome, totalIncome, remaining, totalExpenses, totalInvestments }) {
      return (
        <motion.section layout initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
          transition={{ delay: 0.05, duration: 0.55, ease: [0.2, 0.8, 0.2, 1] }}
          className="relative overflow-hidden rounded-4xl bg-gradient-to-br from-peach-100 via-peach-200 to-ppink-200 p-6 sm:p-8 shadow-soft">
          <div aria-hidden className="absolute -top-8 -right-6 w-40 h-40 bg-white/40 blob-1" />
          <div aria-hidden className="absolute -bottom-10 -left-8 w-32 h-32 bg-pyellow-200/60 blob-2" />
          <div className="relative grid grid-cols-1 sm:grid-cols-2 gap-6 items-end">
            <div>
              <div className="inline-flex items-center gap-1.5 text-xs font-semibold text-ink/70 bg-white/50 rounded-full px-3 py-1 mb-3">
                <span>🌱</span> Monthly Salary
              </div>
              <div className="text-sm text-ink/60 mb-1">Enter your salary</div>
              <MoneyInput value={income} onChange={setIncome} size="xl" placeholder="0" />
            </div>
            <div className="sm:text-right">
              <div className="text-xs font-semibold text-ink/60 uppercase tracking-wider mb-1">
                Cushion after everything
              </div>
              <div className={`text-3xl sm:text-4xl font-extrabold ${remaining >= 0 ? "text-ink" : "text-red-600"}`}>
                <AnimatedNumber value={remaining} prefix="₹" decimals={0} />
              </div>
              <div className="text-xs text-ink/60 mt-1 space-y-0.5">
                <div>Total in <span className="font-semibold">₹{fmt(totalIncome)}</span></div>
                <div>Spending <span className="font-semibold">₹{fmt(totalExpenses)}</span> · Investing <span className="font-semibold">₹{fmt(totalInvestments)}</span></div>
              </div>
            </div>
          </div>
        </motion.section>
      );
    }

    // ——————————————————————————————————————————————————————————————
    //  Generic animated list row (used by multiple cards)
    // ——————————————————————————————————————————————————————————————
    function ListRow({ item, onRemove, rightSlot, badge, focusRing = "focus:ring-plilac-300" }) {
      return (
        <motion.li layout
          initial={{ opacity: 0, y: 10, scale: 0.95 }} animate={{ opacity: 1, y: 0, scale: 1 }}
          exit={{ opacity: 0, x: 40, transition: { duration: 0.25 } }}
          transition={{ type: "spring", stiffness: 260, damping: 24 }}
          className="group flex items-center gap-3 bg-white/60 backdrop-blur rounded-2xl px-4 py-3 shadow-soft">
          <div className="w-9 h-9 rounded-xl bg-white grid place-items-center text-lg shadow-soft">{item.emoji || "💰"}</div>
          <div className="flex-1 min-w-0">
            <div className="font-semibold truncate flex items-center gap-2">
              {item.name}
              {badge}
            </div>
          </div>
          {rightSlot}
          <motion.button whileHover={{ scale: 1.1, rotate: 90 }} whileTap={{ scale: 0.9 }}
            onClick={onRemove}
            className="w-8 h-8 rounded-full bg-white/70 text-ink/60 hover:bg-ppink-200 hover:text-ink transition-colors grid place-items-center"
            aria-label={`Remove ${item.name}`}>✕</motion.button>
        </motion.li>
      );
    }

    // ——————————————————————————————————————————————————————————————
    //  Disposable Income — freelance / family etc.
    // ——————————————————————————————————————————————————————————————
    function DisposableIncomeCard({ items, setItems, total }) {
      const [name, setName] = useState("");
      const [amount, setAmount] = useState("");
      function add() {
        if (!name.trim() || !amount) return;
        setItems([...items, { id: Date.now(), name: name.trim(), amount: parseFloat(amount), emoji: "💸" }]);
        setName(""); setAmount("");
      }
      return (
        <motion.section layout initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
          transition={{ delay: 0.08, duration: 0.55 }}
          className="relative overflow-hidden rounded-4xl bg-gradient-to-br from-pcoral-100 to-pcoral-200 p-6 shadow-soft">
          <div aria-hidden className="absolute -top-10 -right-10 w-40 h-40 bg-white/30 blob-2" />
          <div className="relative">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h3 className="text-lg font-bold flex items-center gap-2"><span>✨</span> Disposable Income</h3>
                <p className="text-xs text-ink/60">Freelance, gifts from family, side income</p>
              </div>
              <div className="text-right">
                <div className="text-xs text-ink/60">Extra this month</div>
                <div className="text-xl font-extrabold"><AnimatedNumber value={total} prefix="₹" /></div>
              </div>
            </div>

            <LayoutGroup>
              <ul className="space-y-2 mb-4">
                <AnimatePresence initial={false}>
                  {items.map((it) => (
                    <ListRow key={it.id} item={it}
                      onRemove={() => setItems(items.filter(x => x.id !== it.id))}
                      rightSlot={<div className="font-bold tabular-nums">+₹{fmt(it.amount, 0)}</div>} />
                  ))}
                </AnimatePresence>
                {items.length === 0 && (
                  <li className="text-sm text-ink/50 italic text-center py-4">No extra income logged this month.</li>
                )}
              </ul>
            </LayoutGroup>

            <div className="flex flex-col sm:flex-row gap-2">
              <input value={name} onChange={(e) => setName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && add()}
                placeholder="Source (e.g. Freelance logo, Mom)"
                className="flex-1 rounded-2xl bg-white/80 px-4 py-3 text-sm font-medium shadow-soft focus:ring-2 focus:ring-pcoral-300 transition" />
              <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && add()}
                placeholder="₹ amount"
                className="w-full sm:w-32 rounded-2xl bg-white/80 px-4 py-3 text-sm font-medium shadow-soft focus:ring-2 focus:ring-pcoral-300 transition" />
              <motion.button whileHover={{ scale: 1.03 }} whileTap={{ scale: 0.97 }} onClick={add}
                className="rounded-2xl bg-ink text-cream font-semibold px-5 py-3 text-sm shadow-soft">
                + Add
              </motion.button>
            </div>
          </div>
        </motion.section>
      );
    }

    // ——————————————————————————————————————————————————————————————
    //  Fixed Expenses (dynamic 2-col grid with add button)
    // ——————————————————————————————————————————————————————————————
    const EXPENSE_COLORS = [
      { key: "pyellow", grad: "from-pyellow-100 to-pyellow-200", accent: "bg-pyellow-300/30", ring: "focus:ring-pyellow-300" },
      { key: "pmint",   grad: "from-pmint-100 to-pmint-200",     accent: "bg-pmint-300/30",   ring: "focus:ring-pmint-300" },
      { key: "pblue",   grad: "from-pblue-100 to-pblue-200",     accent: "bg-pblue-300/30",   ring: "focus:ring-pblue-300" },
      { key: "ppink",   grad: "from-ppink-100 to-ppink-200",     accent: "bg-ppink-300/30",   ring: "focus:ring-ppink-300" },
      { key: "psky",    grad: "from-psky-100 to-psky-200",       accent: "bg-psky-300/30",    ring: "focus:ring-psky-300" },
      { key: "prose",   grad: "from-prose-100 to-prose-200",     accent: "bg-prose-300/30",   ring: "focus:ring-prose-300" },
      { key: "pcoral",  grad: "from-pcoral-100 to-pcoral-200",   accent: "bg-pcoral-300/30",  ring: "focus:ring-pcoral-300" },
      { key: "plilac",  grad: "from-plilac-100 to-plilac-200",   accent: "bg-plilac-300/30",  ring: "focus:ring-plilac-300" },
    ];
    const colorFor = (key) => EXPENSE_COLORS.find((c) => c.key === key) || EXPENSE_COLORS[0];
    const EXPENSE_EMOJI_POOL = ["💰","📦","🧾","🧼","☕","🚗","🚇","📱","🎒","🏋️","🧴","🥘","🪴"];

    function FixedExpensesCard({ items, setItems, total }) {
      const [adding, setAdding] = useState(false);
      const [name, setName] = useState("");
      const [emoji, setEmoji] = useState("💰");
      const [amount, setAmount] = useState("");

      function update(id, patch) {
        setItems(items.map(it => it.id === id ? { ...it, ...patch } : it));
      }
      function remove(id) { setItems(items.filter(it => it.id !== id)); }
      function add() {
        if (!name.trim()) return;
        const color = EXPENSE_COLORS[items.length % EXPENSE_COLORS.length].key;
        setItems([...items, { id: Date.now(), name: name.trim(), emoji, amount: amount ? parseFloat(amount) : 0, color }]);
        setName(""); setAmount(""); setEmoji("💰"); setAdding(false);
      }
      return (
        <section>
          <div className="flex items-baseline justify-between mb-4 px-1 gap-3 flex-wrap">
            <div className="flex items-baseline gap-3">
              <h2 className="text-lg font-bold flex items-center gap-2"><span>📌</span> Fixed Expenses</h2>
              <span className="text-xs text-inkmute">Your monthly commitments</span>
            </div>
            <div className="text-sm font-bold">Total: ₹<AnimatedNumber value={total} /></div>
          </div>
          <LayoutGroup>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <AnimatePresence initial={false}>
                {items.map((e, i) => {
                  const c = colorFor(e.color);
                  return (
                    <motion.div key={e.id} layout
                      initial={{ opacity: 0, y: 20, scale: 0.96 }} animate={{ opacity: 1, y: 0, scale: 1 }}
                      exit={{ opacity: 0, scale: 0.92, transition: { duration: 0.2 } }}

    const GOAL_EMOJIS = ["🎯","🏝️","🏡","🚗","💍","🎓","🛟","🎸","📷","🗾"];
    function GoalsCard({ goals, setGoals }) {
      const [name, setName] = useState("");
      const [target, setTarget] = useState("");
      const [months, setMonths] = useState("12");
      function add() {
        if (!name.trim() || !target) return;
        setGoals([...goals, {
          id: Date.now(), name: name.trim(),
          target: parseFloat(target), saved: 0,
          months: parseInt(months) || 12,
          emoji: GOAL_EMOJIS[Math.floor(Math.random() * GOAL_EMOJIS.length)]
        }]);
        setName(""); setTarget(""); setMonths("12");
      }
      function update(id, field, value) {
        setGoals(goals.map(g => g.id === id ? { ...g, [field]: field === "months" ? (parseInt(value) || 1) : (parseFloat(value) || 0) } : g));
      }
      return (
        <motion.section layout initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
          transition={{ delay: 0.3, duration: 0.55 }}
          className="relative overflow-hidden rounded-4xl bg-gradient-to-br from-pgreen-100 to-pgreen-200 p-6 shadow-soft">

              </div>
            </div>

              <div className="space-y-3 mb-4">
                <AnimatePresence initial={false}>
                  {goals.map((g) => {
                    const pct = g.target > 0 ? Math.min(100, (g.saved / g.target) * 100) : 0;
                    const remainingToSave = Math.max(0, g.target - g.saved);
                    const monthsLeft = Math.max(1, g.months || 12);
                    const perMonth = remainingToSave / monthsLeft;
                    const perWeek = perMonth / 4.33;
                    return (
                      <motion.div key={g.id} layout
                        initial={{ opacity: 0, y: 10, scale: 0.95 }} animate={{ opacity: 1, y: 0, scale: 1 }}
                        exit={{ opacity: 0, x: 40, transition: { duration: 0.25 } }}
                        transition={{ type: "spring", stiffness: 260, damping: 24 }}
                        className="bg-white/70 backdrop-blur rounded-2xl p-4 shadow-soft">
                        <div className="flex items-center gap-3 mb-2">
                          <div className="w-10 h-10 rounded-xl bg-white grid place-items-center text-lg shadow-soft">{g.emoji}</div>
                          <div className="flex-1 min-w-0">
                            <div className="font-semibold truncate">{g.name}</div>
                            <div className="text-xs text-ink/60">
                              <span className="font-bold text-ink">₹{fmt(g.saved, 0)}</span>
                              <span className="mx-1">of</span>
                              <span>₹{fmt(g.target, 0)}</span>
                              <span className="mx-2">·</span>
                              <span className="font-semibold">{Math.round(pct)}%</span>
                            </div>

    function CalendarCard({ history, setHistory, currentSnapshot }) {
      const entries = Object.entries(history || {}).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 12);
      const maxExpense = Math.max(1, ...Object.values(history || {}).map(v => v.expenses || 0));
      const currentYM = new Date().toISOString().slice(0, 7);
      const currentLabel = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'short' });
      function snapshot() {
        setHistory({ ...(history || {}), [currentYM]: { ...currentSnapshot, savedAt: Date.now() } });
      }
      function remove(ym) {
        const next = { ...(history || {}) };
        delete next[ym];
        setHistory(next);
      }
      const alreadySnapshotted = history && history[currentYM];
      return (
        <motion.section layout initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
          transition={{ delay: 0.35, duration: 0.55 }}
          className="relative overflow-hidden rounded-4xl bg-white/80 backdrop-blur p-6 shadow-soft">
          <div aria-hidden className="absolute -top-10 -right-10 w-44 h-44 bg-plilac-100 blob-1" />
          <div aria-hidden className="absolute -bottom-8 -left-8 w-32 h-32 bg-pmint-100 blob-2" />
          <div className="relative">
            <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
              <div>
                <h3 className="text-lg font-bold flex items-center gap-2"><span>📅</span> Monthly Tracker</h3>
                <p className="text-xs text-ink/60">Compare your spending month over month</p>
              </div>
              <motion.button whileHover={{ scale: 1.03 }} whileTap={{ scale: 0.97 }} onClick={snapshot}
                className="rounded-2xl bg-ink text-cream font-semibold px-4 py-2 text-xs shadow-soft">
                📸 {alreadySnapshotted ? `Update ${currentLabel}` : `Snapshot ${currentLabel}`}
              </motion.button>
            </div>

            {entries.length === 0 && (
              <div className="text-sm text-ink/50 italic text-center py-8">
                No snapshots yet — hit "Snapshot" to save this month's totals and start tracking.
              </div>
            )}

            <div className="space-y-2">
              <LayoutGroup>
                <AnimatePresence initial={false}>
                  {entries.map(([ym, data]) => {
                    const pct = (num(data.expenses) / maxExpense) * 100;
                    const label = new Date(ym + "-01").toLocaleDateString(undefined, { year: 'numeric', month: 'short' });
                    const isCurrent = ym === currentYM;
                    return (
                      <motion.div key={ym} layout
                        initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }}
                        exit={{ opacity: 0, x: 40 }}
                        className="flex items-center gap-3 group">
                        <div className={`w-20 text-xs font-semibold shrink-0 flex items-center gap-1 ${isCurrent ? "text-ink" : "text-ink/70"}`}>
                          {isCurrent && <span className="w-1.5 h-1.5 rounded-full bg-pgreen-300" />}
                          {label}
                        </div>
                        <div className="flex-1 h-9 bg-cream rounded-full overflow-hidden relative">
                          <motion.div initial={{ width: 0 }} animate={{ width: `${Math.max(8, pct)}%` }}
                            transition={{ type: "spring", stiffness: 80, damping: 18 }}
                            className="h-full bg-gradient-to-r from-ppink-200 to-prose-200 rounded-full flex items-center px-3 text-xs font-bold text-ink whitespace-nowrap">
                            ₹{fmt(data.expenses)}
                          </motion.div>
                        </div>
                        <div className="w-28 text-[10px] text-ink/60 text-right shrink-0 leading-tight">
                          <div>In <span className="font-semibold text-ink">₹{fmt(data.income)}</span></div>
                          <div className={num(data.savings) >= 0 ? "text-pgreen-300" : "text-red-600"}>
                            Net {num(data.savings) >= 0 ? "+" : ""}₹{fmt(data.savings)}
                          </div>
                        </div>
                        <motion.button whileHover={{ scale: 1.1, rotate: 90 }} whileTap={{ scale: 0.9 }}
                          onClick={() => remove(ym)}
                          className="w-7 h-7 rounded-full bg-cream text-ink/50 hover:bg-ppink-200 hover:text-ink transition-colors grid place-items-center opacity-0 group-hover:opacity-100"
                          aria-label="Remove snapshot">✕</motion.button>
                      </motion.div>
                    );

                </AnimatePresence>
              </LayoutGroup>

    }

    // ——————————————————————————————————————————————————————————————
    //  AI Advisor — context-aware, rule-based
    // ——————————————————————————————————————————————————————————————
    function generateAdvice(q, ctx) {
      const {
        totalIncome, totalExpenses, totalFixed, totalSubs, totalZoey, totalTreat, treatBudget, treatSpent,
        totalInvestments, mfTotal, stTotal, totalDisposable, remaining, savingsRate,
        subscriptions, goals, fixedExpenses, zoey, investments, disposable,
      } = ctx;
      const s = q.toLowerCase();

      const numberMatch = s.match(/[₹$]?\s*([\d,]+(?:\.\d+)?)\s*(k|thousand|lakhs?|l|crores?|cr)?/i);
      let amount = null;
      if (numberMatch) {
        amount = parseFloat(numberMatch[1].replace(/,/g, ""));
        const unit = (numberMatch[2] || "").toLowerCase();
        if (unit === "k" || unit === "thousand") amount *= 1000;
        else if (unit === "l" || unit === "lakh" || unit === "lakhs") amount *= 100000;
        else if (unit === "cr" || unit === "crore" || unit === "crores") amount *= 10000000;
      }

      // 1. Affordability
      if (/\b(afford|buy|purchase|get|spend|should i|can i)\b/.test(s) && amount !== null) {
        if (remaining <= 0) {
          return `Honest answer: you're running a ₹${fmt(Math.abs(remaining))} deficit each month — buying a ₹${fmt(amount)} thing would deepen it. Fix the monthly gap first. Want me to point at where to cut?`;
        }
        if (amount <= remaining * 0.5) return `Yes 💚 At ₹${fmt(amount)}, that's only ~${Math.round((amount/remaining)*100)}% of your ₹${fmt(remaining)} cushion. Totally affordable — just check it moves you toward your goals.`;
        if (amount <= remaining)        return `Technically yes — but it'd eat ${Math.round((amount/remaining)*100)}% of your ₹${fmt(remaining)} remaining, leaving ₹${fmt(remaining-amount)}. Sleep on it for 48 hours.`;
        const months = Math.ceil(amount / remaining);
        return `Not this month. ₹${fmt(amount)} is ₹${fmt(amount-remaining)} more than your ₹${fmt(remaining)} cushion. At your pace, save for ~${months} month${months>1?"s":""} — or trim expenses.`;
      }

      // 2. Budget optimization
      if (/\b(overspend|cut|reduce|trim|optimi[sz]e|save money|biggest|largest|expensive|where.*go|where.*spend)\b/.test(s)) {
        const buckets = [
          ...fixedExpenses.map(e => [`${e.emoji||"💰"} ${e.name}`, num(e.amount)]),
          ["🔁 Subscriptions", totalSubs],
          ["🐶 Zoey", totalZoey],
          ["💖 Treat Myself", num(treatBudget)],
        ].filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
        if (buckets.length === 0) return "Add some expenses first — then I'll point at the biggest opportunities to trim.";
        const [top, second] = buckets;
        const secondTxt = second ? ` Next up: ${second[0]} at ₹${fmt(second[1])}.` : "";
        return `Your biggest bucket is ${top[0]} at ₹${fmt(top[1])} — ${Math.round((top[1]/totalExpenses)*100)}% of total expenses. A 10% trim = ₹${fmt(top[1]*0.1)} back.${secondTxt} Cutting one big thing by 10% beats ten small things by 1%.`;
      }

      // 3. Subscription audit
      if (/\bsubscription/.test(s)) {
        if (subscriptions.length === 0) return "No subscriptions logged yet.";
        const annual = totalSubs * 12;
        const pct = totalIncome > 0 ? ((totalSubs/totalIncome)*100).toFixed(1) : "—";
        const biggest = [...subscriptions].sort((a,b) => b.amount-a.amount)[0];
        return `${subscriptions.length} subscription${subscriptions.length>1?"s":""} = ₹${fmt(totalSubs)}/month = ₹${fmt(annual)}/year (${pct}% of income). Biggest: ${biggest.emoji} ${biggest.name} at ₹${fmt(biggest.amount)}. Audit: did you use each one this month? No → cancel.`;
      }

      // 4. Zoey
      if (/\b(zoey|dog|pet)\b/.test(s)) {
        if (zoey.length === 0) return "Nothing logged for Zoey yet 🐾";
        const biggest = [...zoey].sort((a,b) => b.amount-a.amount)[0];
        return `Zoey costs ₹${fmt(totalZoey)} this month across ${zoey.length} item${zoey.length>1?"s":""} — about ${totalIncome>0 ? ((totalZoey/totalIncome)*100).toFixed(1) : "—"}% of income. Biggest: ${biggest.emoji} ${biggest.name} at ₹${fmt(biggest.amount)}. Pet expenses are lumpy (vet bills!) — consider a small monthly Zoey emergency buffer.`;
      }

      // 5. Treat Myself
      if (/\b(treat|gift|fun money|indulg|splurge)\b/.test(s)) {
        const bNum = num(treatBudget);
        if (bNum === 0) return "Set a Treat Myself budget so you can spoil yourself guilt-free within limits 💖";
        const spent = totalTreat;
        const left = bNum - spent;
        if (left < 0) return `You're ₹${fmt(Math.abs(left))} over your ₹${fmt(bNum)} treat budget this month. No shame — but maybe pause before the next one.`;
        if (left < bNum * 0.2) return `You've used ${Math.round((spent/bNum)*100)}% of your ₹${fmt(bNum)} treat budget. ₹${fmt(left)} left — spend it with intention 💖`;
        return `₹${fmt(left)} left in your ₹${fmt(bNum)} treat budget (${Math.round((spent/bNum)*100)}% used). Go get yourself something nice.`;
      }

      // 6. Investments
      if (/\b(invest|mutual fund|\bmf\b|stock|sip|wealth|portfolio)\b/.test(s)) {
        if (investments.length === 0) return "No investments logged yet. Even ₹500/month in an index fund compounds — start with one SIP.";
        const annual = totalInvestments * 12;
        const rate = totalIncome > 0 ? ((totalInvestments/totalIncome)*100).toFixed(1) : "—";
        return `Putting ₹${fmt(totalInvestments)}/month away — ₹${fmt(mfTotal)} in MF, ₹${fmt(stTotal)} in stocks. That's ₹${fmt(annual)}/year = ${rate}% of income. Rule of thumb: 10–15% in equity is solid if you have an emergency fund first.`;
      }

      // 7. Disposable / extra income
      if (/\b(disposable|freelance|extra|side|family|gift income)\b/.test(s)) {
        if (disposable.length === 0) return "No extra income logged this month. Salary alone is fine — but windfalls go to goals 💪";
        return `You've got ₹${fmt(totalDisposable)} extra this month on top of salary. The discipline move: send at least 50% of windfalls straight to goals or investments, so lifestyle doesn't quietly absorb it.`;
      }

      // 8. Goals + weekly/monthly pace
      if (/\b(goal|target|progress|pace|week|month)\b/.test(s)) {
        if (goals.length === 0) return "No goals yet — add one with a timeline and I'll tell you exactly how much to save per week.";
        const perMonthTotal = goals.reduce((a,g) => a + Math.max(0, g.target - g.saved) / Math.max(1, g.months || 12), 0);
        const perWeekTotal = perMonthTotal / 4.33;
        return `To hit all ${goals.length} goal${goals.length>1?"s":""} on time: save ₹${fmt(perMonthTotal)}/month or ₹${fmt(perWeekTotal)}/week combined. Your current cushion is ₹${fmt(remaining)}/month — ${remaining >= perMonthTotal ? "you're ahead of pace 🚀" : `you're ₹${fmt(perMonthTotal - remaining)}/month short — stretch deadlines or trim expenses.`}`;
      }

      // 9. Overall
      if (/\b(how.*doing|health|status|summary|overview|check[- ]?in)\b/.test(s)) {
        if (totalIncome === 0) return "Enter your income first and I'll give you an honest read.";
        if (remaining < 0) return `You're ₹${fmt(Math.abs(remaining))} in the red. Fix this first — a negative cushion compounds into debt.`;
        if (savingsRate >= 30) return `Thriving. ${Math.round(savingsRate)}% of income not consumed — top-decile. Risk: lifestyle creep. Lock it in with automated SIPs.`;
        if (savingsRate >= 15) return `Healthy. ${Math.round(savingsRate)}% save rate, ₹${fmt(remaining)} cushion, ₹${fmt(totalInvestments)}/mo investments. Nudge: name every rupee.`;
        return `Tight. ${Math.round(savingsRate)}% save rate is below the 20% benchmark. Cushion (₹${fmt(remaining)}) is fragile. Pay savings first.`;
      }

      return `Ask me things like:\n• "Can I afford a ₹50,000 laptop?"\n• "Where am I overspending?"\n• "How much should I save per week for my goals?"\n• "How are my subscriptions?"\n• "How much am I spending on Zoey?"\n• "How's my treat budget?"\n• "How are my investments?"\n• "How am I doing overall?"`;
    }

    function AIChatCard({ ctx }) {
      const [messages, setMessages] = useState([
        { id: 0, role: "ai", text: "Hey 👋 I'm Mate, your money buddy. I can see your full picture — income, fixed expenses, Zoey, treats, investments, goals, monthly history. Ask me anything." },
      ]);
      const [input, setInput] = useState("");
      const [isTyping, setIsTyping] = useState(false);
      const scrollRef = useRef(null);
      useEffect(() => { scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" }); }, [messages, isTyping]);

      function send(e) {
        e?.preventDefault();
        const text = input.trim();
        if (!text || isTyping) return;
        setMessages(m => [...m, { id: Date.now(), role: "user", text }]);
        setInput(""); setIsTyping(true);
        const delay = 600 + Math.random() * 600;
        setTimeout(() => {
          setMessages(m => [...m, { id: Date.now()+1, role: "ai", text: generateAdvice(text, ctx) }]);
          setIsTyping(false);
        }, delay);
      }
      const suggestions = [
        "How am I doing?",
        "Per-week goal pace?",
        "Where am I overspending?",
        "How are my investments?",
      ];
      return (
        <motion.section initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}

          data-export-ignore="true"
          className="relative overflow-hidden rounded-4xl bg-gradient-to-br from-plilac-100 to-plilac-200 shadow-pop flex flex-col min-h-0 flex-1">
          <div aria-hidden className="absolute -bottom-12 -right-10 w-40 h-40 bg-white/30 blob-3 pointer-events-none" />
          <div className="relative px-5 pt-5 pb-3 flex items-center gap-3">
            <motion.div animate={{ scale: [1, 1.08, 1] }}
              transition={{ duration: 2.4, repeat: Infinity, ease: "easeInOut" }}

              <div className="font-bold text-sm">Mate · AI Advisor</div>
              <div className="text-[11px] text-ink/60 flex items-center gap-1">
                <span className="w-1.5 h-1.5 rounded-full bg-pgreen-300 inline-block" /> context-aware · session only
              </div>
            </div>
          </div>
          <div ref={scrollRef} className="relative flex-1 min-h-[260px] max-h-[520px] lg:max-h-none overflow-y-auto thin-scroll px-4 py-2 space-y-2">
            <AnimatePresence initial={false}>
              {messages.map((m) => (
                <motion.div key={m.id}
                  initial={{ opacity: 0, y: 8, scale: 0.96 }} animate={{ opacity: 1, y: 0, scale: 1 }}
                  transition={{ type: "spring", stiffness: 260, damping: 24 }}

                    {m.text}
                  </div>
                </motion.div>
              ))}
              {isTyping && (
                <motion.div key="typing" initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
                  className="flex justify-start">
                  <div className="bg-white/90 rounded-3xl rounded-bl-lg px-4 py-3 shadow-soft"><TypingDots /></div>
                </motion.div>
              )}
            </AnimatePresence>
          </div>
          {messages.length <= 1 && !isTyping && (
            <div className="px-4 pb-2 flex flex-wrap gap-1.5">
              {suggestions.map((sg) => (
                <motion.button key={sg} whileHover={{ scale: 1.04 }} whileTap={{ scale: 0.96 }}
                  onClick={() => { setInput(sg); setTimeout(() => send(), 0); }}
                  className="text-[11px] font-medium bg-white/70 hover:bg-white rounded-full px-3 py-1.5 text-ink/75 transition">
                  {sg}
                </motion.button>
              ))}
            </div>
          )}
          <form onSubmit={send} className="relative p-3 pt-2 flex items-center gap-2">
            <input value={input} onChange={(e) => setInput(e.target.value)}
              placeholder="Ask me anything about your money…"
              className="flex-1 rounded-2xl bg-white/90 px-4 py-3 text-sm font-medium shadow-soft focus:ring-2 focus:ring-plilac-300 transition" />
            <motion.button whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }} type="submit"
              disabled={!input.trim() || isTyping}
              className="rounded-2xl bg-ink text-cream font-semibold px-4 py-3 text-sm shadow-soft disabled:opacity-40 disabled:cursor-not-allowed">
              ➤
            </motion.button>
          </form>
        </motion.section>
      );
    }

    // ——————————————————————————————————————————————————————————————
    //  Root
    // ——————————————————————————————————————————————————————————————
    function App() {
      const [income, setIncome, incomeSavedAt] = usePersistedState("moneymate:income", "80000");
      const [disposable, setDisposable, dispSavedAt] = usePersistedState("moneymate:disposable", [
        { id: 1, name: "Freelance logo", amount: 12000, emoji: "💸" },
      ]);
      const [fixedExpenses, setFixedExpenses, fixedSavedAt] = usePersistedState("moneymate:fixedExpenses", [
        { id: 1, name: "Rent",         emoji: "🏠", amount: 25000, color: "pyellow" },
        { id: 2, name: "Credit Card",  emoji: "💳", amount: 5000,  color: "pblue" },
        { id: 3, name: "Maintenance",  emoji: "🔧", amount: 1500,  color: "pmint" },
        { id: 4, name: "Electricity",  emoji: "💡", amount: 1500,  color: "pyellow" },
        { id: 5, name: "Furniture",    emoji: "🛋️", amount: 2000,  color: "pblue" },
        { id: 6, name: "Travel",       emoji: "✈️", amount: 4000,  color: "ppink" },
      ]);
      const [subscriptions, setSubscriptions, subsSavedAt] = usePersistedState("moneymate:subscriptions", [
        { id: 1, name: "Netflix",  amount: 649, emoji: "🎬" },
        { id: 2, name: "Spotify",  amount: 119, emoji: "🎵" },
        { id: 3, name: "Hotstar",  amount: 299, emoji: "📺" },
        { id: 4, name: "iCloud+",  amount: 75,  emoji: "☁️" },
      ]);
      const [zoey, setZoey, zoeySavedAt] = usePersistedState("moneymate:zoey", [
        { id: 1, name: "Kibble",      amount: 2200, emoji: "🦴" },
        { id: 2, name: "Vet checkup", amount: 800,  emoji: "🩺" },
      ]);
      const [treatBudget, setTreatBudget, tbSavedAt] = usePersistedState("moneymate:treatBudget", "5000");
      const [treatSpent, setTreatSpent, tsSavedAt] = usePersistedState("moneymate:treatSpent", [
        { id: 1, name: "Bookstore haul", amount: 1200, emoji: "📖" },
      ]);
      const [investments, setInvestments, invSavedAt] = usePersistedState("moneymate:investments", [
        { id: 1, type: "MF",    name: "Parag Parikh Flexi", amount: 5000, emoji: "📈" },
        { id: 2, type: "MF",    name: "UTI Nifty Index",    amount: 3000, emoji: "📈" },
        { id: 3, type: "Stock", name: "INFY",               amount: 2000, emoji: "💹" },
      ]);
      const [goals, setGoals, goalsSavedAt] = usePersistedState("moneymate:goals", [
        { id: 1, name: "Emergency Fund", target: 100000, saved: 25000, months: 10, emoji: "🛟" },
        { id: 2, name: "Trip to Japan",  target: 200000, saved: 45000, months: 18, emoji: "🗾" },
      ]);
      const [history, setHistory, historySavedAt] = usePersistedState("moneymate:history", {});

      const lastSavedAt = Math.max(incomeSavedAt||0, dispSavedAt||0, fixedSavedAt||0, subsSavedAt||0, zoeySavedAt||0, tbSavedAt||0, tsSavedAt||0, invSavedAt||0, goalsSavedAt||0, historySavedAt||0);

      function resetAllData() {
        if (!window.confirm("Clear all your MoneyMate data from this browser? This cannot be undone.")) return;
        ["moneymate:income","moneymate:disposable","moneymate:fixedExpenses","moneymate:subscriptions","moneymate:zoey","moneymate:treatBudget","moneymate:treatSpent","moneymate:investments","moneymate:goals","moneymate:history"]
          .forEach(k => { try { window.localStorage.removeItem(k); } catch (e) {} });
        window.location.reload();
      }

      // Derived
      const mainIncome = num(income);
      const totalDisposable = useMemo(() => disposable.reduce((a, d) => a + num(d.amount), 0), [disposable]);
      const totalIncome = mainIncome + totalDisposable;
      const totalFixed = useMemo(() => fixedExpenses.reduce((a, e) => a + num(e.amount), 0), [fixedExpenses]);
      const totalSubs  = useMemo(() => subscriptions.reduce((a, s) => a + num(s.amount), 0), [subscriptions]);
      const totalZoey  = useMemo(() => zoey.reduce((a, z) => a + num(z.amount), 0), [zoey]);
      const totalTreat = useMemo(() => treatSpent.reduce((a, t) => a + num(t.amount), 0), [treatSpent]);
      const treatBudgetNum = num(treatBudget);
      const totalInvestments = useMemo(() => investments.reduce((a, i) => a + num(i.amount), 0), [investments]);
      const mfTotal = useMemo(() => investments.filter(i => i.type === "MF").reduce((a, i) => a + num(i.amount), 0), [investments]);
      const stTotal = useMemo(() => investments.filter(i => i.type === "Stock").reduce((a, i) => a + num(i.amount), 0), [investments]);

      // Treat budget counts as an expense commitment (you set it aside).
      const totalExpenses = totalFixed + totalSubs + totalZoey + treatBudgetNum;
      const remaining = totalIncome - totalExpenses - totalInvestments;
      const savingsRate = totalIncome > 0 ? ((totalInvestments + Math.max(0, remaining)) / totalIncome) * 100 : 0;

      const currentSnapshot = {
        income: totalIncome,
        expenses: totalExpenses + totalInvestments,
        savings: remaining + totalInvestments,
      };

      const ctx = {
        totalIncome, totalExpenses, totalFixed, totalSubs, totalZoey, totalTreat, treatBudget: treatBudgetNum, treatSpent,
        totalInvestments, mfTotal, stTotal, totalDisposable,
        remaining, savingsRate,
        subscriptions, goals, fixedExpenses, zoey, investments, disposable,
      };

      return (
        <div className="min-h-screen relative overflow-x-hidden">
          <div aria-hidden data-export-ignore="true" className="pointer-events-none fixed inset-0 overflow-hidden">
            <motion.div animate={{ x: [0, 30, 0], y: [0, -20, 0] }}
              transition={{ duration: 18, repeat: Infinity, ease: "easeInOut" }}
              className="absolute -top-32 -left-24 w-[28rem] h-[28rem] bg-ppink-200/35 blob-1 blur-3xl" />
            <motion.div animate={{ x: [0, -40, 0], y: [0, 30, 0] }}
              transition={{ duration: 22, repeat: Infinity, ease: "easeInOut" }}
              className="absolute top-1/3 -right-40 w-[32rem] h-[32rem] bg-plilac-200/30 blob-2 blur-3xl" />
            <motion.div animate={{ x: [0, 40, 0], y: [0, -40, 0] }}
              transition={{ duration: 26, repeat: Infinity, ease: "easeInOut" }}
              className="absolute -bottom-32 left-1/4 w-[26rem] h-[26rem] bg-pmint-200/35 blob-3 blur-3xl" />
          </div>

          <div data-export-root className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 py-6 lg:py-10">
            <Header savedAt={lastSavedAt} onReset={resetAllData} />

            <div className="mt-8 grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_380px] gap-6 lg:gap-8">
              <main className="space-y-6 min-w-0">
                <IncomeCard
                  income={income} setIncome={setIncome}
                  totalIncome={totalIncome}
                  remaining={remaining}
                  totalExpenses={totalExpenses}
                  totalInvestments={totalInvestments} />
                <DisposableIncomeCard items={disposable} setItems={setDisposable} total={totalDisposable} />
                <FixedExpensesCard items={fixedExpenses} setItems={setFixedExpenses} total={totalFixed} />
                <SubscriptionsCard subscriptions={subscriptions} setSubscriptions={setSubscriptions} total={totalSubs} />
                <ZoeyCard items={zoey} setItems={setZoey} total={totalZoey} />
                <TreatMyselfCard
                  budget={treatBudget} setBudget={setTreatBudget}
                  spent={treatSpent} setSpent={setTreatSpent}
                  spentTotal={totalTreat} />
                <InvestmentsCard items={investments} setItems={setInvestments} total={totalInvestments} />
                <GoalsCard goals={goals} setGoals={setGoals} />
                <CalendarCard history={history} setHistory={setHistory} currentSnapshot={currentSnapshot} />
              </main>

              <aside className="lg:sticky lg:top-6 lg:self-start lg:h-[calc(100vh-3rem)] flex flex-col gap-5 min-h-0">
                <SummaryCard
                  totalIncome={totalIncome}
                  totalExpenses={totalExpenses}
                  totalInvestments={totalInvestments}
                  remaining={remaining}
                  savingsRate={savingsRate} />
                <AIChatCard ctx={ctx} />
              </aside>
            </div>

            <footer data-export-ignore="true" className="mt-10 text-center text-xs text-ink/40">
              MoneyMate · data stays in your browser · made with 💜
            </footer>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
